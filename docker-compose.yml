services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: myfi
      POSTGRES_USER: myfi
      POSTGRES_PASSWORD: myfi_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myfi -d myfi"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
